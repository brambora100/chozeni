<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rodinná Výzva Ultra</title>

    <!-- iOS PWA SETTINGS -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Výzva 2024">
    <link rel="apple-touch-icon" href="https://media.istockphoto.com/id/1444049332/cs/vektor/ikona-stylu-ch%C5%AFze.jpg?s=170667a&w=0&k=20&c=17S18onZsf4EhVbs5uJVUirQGGRVhA4_WiEZID1Fc3Q=">
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root { --p: #10b981; --a: #ff5722; --bg: #0f172a; --c: #1e293b; --t: #f8fafc; --grad: linear-gradient(135deg, #10b981 0%, #059669 100%); }
        
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--t); margin: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* --- AUTH --- */
        #auth-screen { position: fixed; inset: 0; background: var(--bg); z-index: 3000; display: flex; align-items: center; justify-content: center; padding: 25px; }
        .auth-card { width: 100%; max-width: 400px; background: var(--c); padding: 40px 30px; border-radius: 40px; box-shadow: 0 30px 60px rgba(0,0,0,0.6); text-align: center; border: 1px solid rgba(255,255,255,0.05); }
        input { width: 100%; padding: 18px; margin: 12px 0; border-radius: 20px; border: 1px solid #334155; background: #0f172a; color: white; box-sizing: border-box; font-size: 1rem; outline: none; }

        /* --- UI COMPONENTS --- */
        .btn { width: 100%; padding: 18px; border: none; border-radius: 20px; font-weight: 800; cursor: pointer; transition: 0.3s; font-size: 1rem; text-transform: uppercase; margin-top: 10px; }
        .btn-p { background: var(--grad); color: white; box-shadow: 0 10px 20px rgba(16, 185, 129, 0.3); }
        
        nav { background: var(--c); padding: 18px 25px; display: flex; justify-content: space-between; align-items: center; z-index: 1000; }
        .nav-title { font-weight: 900; font-size: 1.2rem; color: var(--p); }

        /* --- MENU --- */
        #side-menu { position: fixed; top: 0; left: -100%; width: 85%; max-width: 320px; height: 100%; background: #111827; z-index: 2000; transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1); box-shadow: 20px 0 50px rgba(0,0,0,0.8); }
        #side-menu.active { left: 0; }
        .menu-header { padding: 50px 30px 30px; background: var(--c); border-bottom: 1px solid #334155; }
        .menu-user-img { width: 60px; height: 60px; background: var(--grad); border-radius: 20px; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; margin-bottom: 15px; }
        .menu-item { padding: 18px 30px; display: flex; align-items: center; gap: 15px; font-weight: 600; color: #94a3b8; cursor: pointer; }
        .menu-item.active { color: white; background: rgba(16, 185, 129, 0.1); }
        .menu-item i { color: var(--p); }

        /* --- SCREENS --- */
        .screen { display: none; padding: 20px; flex-grow: 1; overflow-y: auto; }
        .screen.active { display: flex; flex-direction: column; }
        #map { height: 300px; min-height: 300px; border-radius: 35px; margin-bottom: 15px; border: 2px solid #334155; }

        /* --- STATS --- */
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .stat-box { background: var(--c); padding: 15px 5px; border-radius: 22px; text-align: center; }
        .stat-box span { display: block; font-size: 1.3rem; font-weight: 900; color: var(--p); }
        .stat-box label { font-size: 0.6rem; color: #64748b; text-transform: uppercase; }

        /* --- FIX PRO NASTAVENÍ --- */
        .settings-group { background: var(--c); border-radius: 25px; padding: 25px; margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.03); }
        .settings-group label { display: block; color: #94a3b8; font-size: 0.85rem; margin-bottom: 8px; font-weight: 600; text-align: left; }
        .settings-group input { margin-bottom: 15px; }

        .history-card { background: var(--c); padding: 20px; border-radius: 25px; margin-bottom: 15px; border-left: 6px solid var(--p); }
        .mini-map { height: 130px; border-radius: 20px; margin-top: 15px; }
        #overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 1900; backdrop-filter: blur(4px); }
    </style>
</head>
<body>

<div id="auth-screen">
    <div class="auth-card">
        <h1 id="t-title" style="margin:0; color: var(--p);">Rodinná Výzva</h1>
        <p id="t-desc" style="color: #64748b; margin-bottom: 25px;">Změř své síly s rodinou</p>
        <input type="email" id="a-email" placeholder="E-mail">
        <input type="password" id="a-pass" placeholder="Heslo">
        <button class="btn btn-p" onclick="handleAuth()" id="a-btn">PŘIHLÁSIT SE</button>
        <div class="auth-toggle" onclick="toggleAuthMode()" id="a-mode">Nemáš účet? Zaregistruj se</div>
        <p id="a-err" style="color: #ef4444; font-size: 0.8rem; margin-top: 15px;"></p>
    </div>
</div>

<nav id="main-nav" style="display:none;">
    <div onclick="toggleMenu()" style="font-size: 1.5rem; color: var(--p); cursor: pointer;"><i class="fas fa-bars"></i></div>
    <div class="nav-title">VÝZVA 2024</div>
    <div style="width: 20px;"></div>
</nav>

<div id="overlay" onclick="toggleMenu()"></div>

<div id="side-menu">
    <div class="menu-header">
        <div class="menu-user-img"><i class="fas fa-walking"></i></div>
        <div id="menu-email" style="font-weight: 800; font-size: 1rem; overflow: hidden; text-overflow: ellipsis;">...</div>
    </div>
    <div style="padding-top: 10px;">
        <div class="menu-item active" id="m-track" onclick="go('track')"><i class="fas fa-play"></i> Nová trasa</div>
        <div class="menu-item" id="m-hist" onclick="go('hist')"><i class="fas fa-history"></i> Historie</div>
        <div class="menu-item" id="m-sett" onclick="go('sett')"><i class="fas fa-cog"></i> Nastavení</div>
        <div class="menu-item" onclick="logout()" style="color: #ef4444; margin-top: 30px;"><i class="fas fa-sign-out-alt"></i> Odhlásit se</div>
    </div>
</div>

<div id="track" class="screen active">
    <div id="map"></div>
    <div class="stat-grid">
        <div class="stat-box"><span id="s-dist">0.00</span><label>Kilometry</label></div>
        <div class="stat-box"><span id="s-time">00:00</span><label>Čas</label></div>
        <div class="stat-box"><span id="s-pts">0</span><label>Body</label></div>
    </div>
    <button id="startB" class="btn btn-p" style="height: 70px;" onclick="start()">START CHŮZE</button>
    <button id="stopB" class="btn" style="height: 70px; background: #ef4444; color: white; display: none;" onclick="stop()">STOP A ULOŽIT</button>
</div>

<div id="hist" class="screen">
    <h2 style="margin-bottom: 20px;">Moje výkony</h2>
    <div id="hist-list"></div>
</div>

<div id="sett" class="screen">
    <h2 style="margin-bottom: 20px;">Nastavení účtu</h2>
    <div class="settings-group">
        <label><i class="fas fa-envelope"></i> Změna e-mailu</label>
        <input type="email" id="new-email" placeholder="Nový e-mail">
        <button class="btn btn-p" style="padding: 14px;" onclick="updateEmail()">Uložit e-mail</button>
    </div>
    <div class="settings-group">
        <label><i class="fas fa-lock"></i> Změna hesla</label>
        <input type="password" id="n-pass" placeholder="Min. 6 znaků">
        <button class="btn btn-p" style="padding: 14px; background: #334155;" onclick="upPass()">Změnit heslo</button>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDNrZQJDgTITduIm62uTU1QTaDLBMZ9hws",
        authDomain: "donutgamba.firebaseapp.com",
        projectId: "donutgamba",
        storageBucket: "donutgamba.firebasestorage.app",
        messagingSenderId: "785116130586",
        appId: "1:785116130586:web:e7a4c72b9fed8a9efdd0a3"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth(), db = firebase.firestore();

    let map, path, userMarker, watch, last, dist = 0, coords = [], user, isReg = false, startTime, timerInt;

    function toggleAuthMode() {
        isReg = !isReg;
        document.getElementById('t-title').innerText = isReg ? "Registrace" : "Rodinná Výzva";
        document.getElementById('a-btn').innerText = isReg ? "VYTVOŘIT ÚČET" : "PŘIHLÁSIT SE";
    }

    async function handleAuth() {
        const e = document.getElementById('a-email').value, p = document.getElementById('a-pass').value;
        try {
            if (isReg) await auth.createUserWithEmailAndPassword(e, p);
            else await auth.signInWithEmailAndPassword(e, p);
        } catch (err) { document.getElementById('a-err').innerText = err.message; }
    }

    auth.onAuthStateChanged(u => {
        if (u) {
            user = u;
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('main-nav').style.display = 'flex';
            document.getElementById('menu-email').innerText = u.email;
            document.getElementById('new-email').value = u.email;
            initMap();
        }
    });

    function logout() { auth.signOut(); location.reload(); }

    function toggleMenu() {
        document.getElementById('side-menu').classList.toggle('active');
        const o = document.getElementById('overlay');
        o.style.display = (o.style.display === 'block') ? 'none' : 'block';
    }

    function go(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.menu-item').forEach(m => m.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.getElementById('m-' + id).classList.add('active');
        toggleMenu();
        if (id === 'hist') loadHist();
    }

    function initMap() {
        if (map) return;
        map = L.map('map', {zoomControl:false}).setView([50, 14], 15);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}.png').addTo(map);
        path = L.polyline([], {color: '#10b981', weight: 6}).addTo(map);
        userMarker = L.circleMarker([50, 14], { radius: 9, fillColor: "#ff5722", color: "#fff", weight: 3, fillOpacity: 1 }).addTo(map);
        navigator.geolocation.getCurrentPosition(p => {
            map.setView([p.coords.latitude, p.coords.longitude], 16);
            userMarker.setLatLng([p.coords.latitude, p.coords.longitude]);
        });
    }

    function start() {
        dist = 0; coords = []; last = null; startTime = Date.now();
        document.getElementById('startB').style.display = 'none';
        document.getElementById('stopB').style.display = 'block';
        timerInt = setInterval(() => {
            const sec = Math.floor((Date.now() - startTime) / 1000);
            document.getElementById('s-time').innerText = new Date(sec * 1000).toISOString().substr(14, 5);
        }, 1000);
        watch = navigator.geolocation.watchPosition(p => {
            const cur = L.latLng(p.coords.latitude, p.coords.longitude);
            userMarker.setLatLng(cur);
            if (last) {
                let d = last.distanceTo(cur);
                if (d > 3) {
                    dist += d;
                    coords.push([p.coords.latitude, p.coords.longitude]);
                    path.setLatLngs(coords);
                    map.panTo(cur);
                }
            }
            last = cur;
            document.getElementById('s-dist').innerText = (dist/1000).toFixed(2);
            document.getElementById('s-pts').innerText = Math.floor((dist/1000) * 10);
        }, null, {enableHighAccuracy: true});
    }

    async function stop() {
        clearInterval(timerInt);
        navigator.geolocation.clearWatch(watch);
        if (dist > 5) {
            await db.collection("aktivity").add({
                uid: user.uid,
                vzdalenost: parseFloat((dist/1000).toFixed(2)),
                body: Math.floor((dist/1000) * 10),
                cas: document.getElementById('s-time').innerText,
                trasa: JSON.stringify(coords),
                datum: firebase.firestore.FieldValue.serverTimestamp()
            });
        }
        location.reload();
    }

    async function loadHist() {
        const list = document.getElementById('hist-list');
        list.innerHTML = "";
        const snap = await db.collection("aktivity").where("uid", "==", user.uid).orderBy("datum", "desc").limit(10).get();
        snap.forEach(doc => {
            const d = doc.data();
            const id = doc.id;
            list.innerHTML += `
                <div class="history-card">
                    <div style="display:flex; justify-content:space-between; font-weight:900;">
                        <span>${d.vzdalenost} km</span>
                        <span style="color:var(--p);">+${d.body} b</span>
                    </div>
                    <div style="font-size:0.8rem; color:#64748b;">${d.datum ? d.datum.toDate().toLocaleDateString() : ""} | ${d.cas}</div>
                    <div id="map-${id}" class="mini-map"></div>
                </div>`;
            setTimeout(() => {
                const m = L.map(`map-${id}`, {zoomControl:false, attributionControl:false}).setView([50, 14], 15);
                L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}.png').addTo(m);
                const t = JSON.parse(d.trasa || "[]");
                if (t.length > 0) {
                    const p = L.polyline(t, {color: '#10b981', weight: 4}).addTo(m);
                    m.fitBounds(p.getBounds(), {padding: [10, 10]});
                }
            }, 300);
        });
    }

    async function updateEmail() {
        try { await user.updateEmail(document.getElementById('new-email').value); alert("Email změněn!"); } 
        catch (e) { alert("Musíš se znovu přihlásit."); }
    }
    async function upPass() {
        try { await user.updatePassword(document.getElementById('n-pass').value); alert("Heslo změněno!"); } 
        catch (e) { alert(e.message); }
    }
</script>
</body>
</html>
