<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rodinná Výzva 2026 Ultra</title>

    <!-- iOS APP SETTINGS -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Výzva 2026">
    <link rel="apple-touch-icon" href="https://media.istockphoto.com/id/1444049332/cs/vektor/ikona-stylu-ch%C5%AFze.jpg?s=170667a&w=0&k=20&c=17S18onZsf4EhVbs5uJVUirQGGRVhA4_WiEZID1Fc3Q=">
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root { 
            --p: #10b981; 
            --a: #ff5722; 
            --bg: #0f172a; 
            --c: #1e293b; 
            --t: #f8fafc; 
            --grad: linear-gradient(135deg, #10b981 0%, #059669 100%); 
        }
        
        body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: var(--t); margin: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* --- LUXURY AUTH --- */
        #auth-screen { position: fixed; inset: 0; background: var(--bg); z-index: 3000; display: flex; align-items: center; justify-content: center; padding: 25px; }
        .auth-card { width: 100%; max-width: 400px; background: var(--c); padding: 40px 30px; border-radius: 40px; box-shadow: 0 30px 60px rgba(0,0,0,0.6); text-align: center; border: 1px solid rgba(255,255,255,0.05); }
        input { width: 100%; padding: 18px; margin: 12px 0; border-radius: 20px; border: 1px solid #334155; background: #0f172a; color: white; box-sizing: border-box; font-size: 1rem; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--p); box-shadow: 0 0 10px rgba(16, 185, 129, 0.2); }
        
        .btn { width: 100%; padding: 18px; border: none; border-radius: 20px; font-weight: 800; cursor: pointer; transition: 0.3s; font-size: 1rem; text-transform: uppercase; letter-spacing: 1px; }
        .btn-p { background: var(--grad); color: white; box-shadow: 0 10px 20px rgba(16, 185, 129, 0.3); }

        /* --- NAVIGATION --- */
        nav { background: var(--c); padding: 18px 25px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 5px 20px rgba(0,0,0,0.4); z-index: 1000; }
        .nav-title { font-weight: 900; font-size: 1.2rem; background: var(--grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        /* --- HAMBURGER MENU --- */
        #side-menu { position: fixed; top: 0; left: -100%; width: 85%; max-width: 320px; height: 100%; background: #111827; z-index: 2000; transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1); padding: 0; box-shadow: 20px 0 50px rgba(0,0,0,0.8); }
        #side-menu.active { left: 0; }
        .menu-header { padding: 50px 30px 30px; background: var(--c); border-bottom: 1px solid #334155; }
        .menu-user-img { width: 60px; height: 60px; background: var(--grad); border-radius: 20px; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; margin-bottom: 15px; }
        .menu-items { padding: 20px; }
        .menu-item { padding: 18px 20px; display: flex; align-items: center; gap: 15px; border-radius: 18px; margin-bottom: 8px; font-weight: 600; color: #94a3b8; transition: 0.3s; cursor: pointer; }
        .menu-item i { font-size: 1.2rem; width: 30px; text-align: center; color: var(--p); }
        .menu-item.active { background: rgba(16, 185, 129, 0.1); color: var(--p); }

        /* --- SCREENS --- */
        .screen { display: none; padding: 20px; flex-grow: 1; overflow-y: auto; }
        .screen.active { display: flex; flex-direction: column; }
        #map { height: 320px; border-radius: 35px; margin-bottom: 15px; border: 2px solid #334155; box-shadow: 0 15px 30px rgba(0,0,0,0.3); }

        .stat-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; margin-bottom: 25px; }
        .stat-box { background: var(--c); padding: 20px 10px; border-radius: 25px; text-align: center; border: 1px solid rgba(255,255,255,0.03); }
        .stat-box span { display: block; font-size: 1.4rem; font-weight: 900; color: var(--p); }
        .stat-box label { font-size: 0.65rem; color: #64748b; text-transform: uppercase; font-weight: bold; }

        .stats-summary { background: var(--grad); border-radius: 30px; padding: 25px; margin-bottom: 20px; display: flex; justify-content: space-around; box-shadow: 0 15px 30px rgba(16, 185, 129, 0.2); }
        .summary-item { text-align: center; color: white; }
        .summary-item b { display: block; font-size: 1.4rem; font-weight: 900; }
        .summary-item label { font-size: 0.7rem; font-weight: bold; opacity: 0.9; text-transform: uppercase; }

        .history-card { background: var(--c); padding: 20px; border-radius: 25px; margin-bottom: 15px; border-left: 6px solid var(--p); }
        .mini-map { height: 130px; border-radius: 20px; margin-top: 15px; }
        
        #overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 1900; backdrop-filter: blur(4px); }
        .debug-bar { font-size: 0.7rem; color: #64748b; text-align: center; margin-bottom: 10px; font-family: monospace; }
    </style>
</head>
<body>

<div id="auth-screen">
    <div class="auth-card">
        <div class="menu-user-img" style="margin: 0 auto 20px;"><i class="fas fa-bolt"></i></div>
        <h1 style="margin:0; font-size: 1.8rem;">VÝZVA 2026</h1>
        <p style="color: #64748b; margin-bottom: 30px;">Vítej v elitním týmu</p>
        <input type="email" id="a-email" placeholder="Tvůj e-mail">
        <input type="password" id="a-pass" placeholder="Tvé heslo">
        <button class="btn btn-p" onclick="handleAuth()" id="a-btn">VSTOUPIT</button>
        <div onclick="toggleAuthMode()" id="a-mode" style="margin-top:20px; color:#94a3b8; cursor:pointer;">Nemáš účet? Registruj se</div>
    </div>
</div>

<nav id="main-nav" style="display:none;">
    <div onclick="toggleMenu()" style="font-size: 1.4rem; color: var(--p); cursor: pointer;"><i class="fas fa-align-left"></i></div>
    <div class="nav-title">VÝZVA 2026</div>
    <div style="width: 25px;"></div>
</nav>

<div id="overlay" onclick="toggleMenu()"></div>

<div id="side-menu">
    <div class="menu-header">
        <div class="menu-user-img"><i class="fas fa-user-astronaut"></i></div>
        <div id="menu-email" style="font-weight: 800; font-size: 1.1rem; overflow: hidden; text-overflow: ellipsis;">...</div>
        <div style="color: var(--p); font-size: 0.8rem; font-weight: bold;">Elitní člen rodiny</div>
    </div>
    <div class="menu-items">
        <div class="menu-item active" id="m-track" onclick="go('track')"><i class="fas fa-person-walking"></i> Nová trasa</div>
        <div class="menu-item" id="m-hist" onclick="go('hist')"><i class="fas fa-trophy"></i> Moje výkony</div>
        <div class="menu-item" id="m-sett" onclick="go('sett')"><i class="fas fa-sliders"></i> Nastavení</div>
        <div class="menu-item" onclick="logout()" style="color: #ef4444; margin-top: 40px;"><i class="fas fa-power-off"></i> Odhlásit se</div>
    </div>
</div>

<div id="track" class="screen active">
    <div id="map"></div>
    <div id="debug" class="debug-bar">Satelit: Připraven k zaměření</div>
    <div class="stat-grid">
        <div class="stat-box"><span id="s-dist">0.00</span><label>KM</label></div>
        <div class="stat-box"><span id="s-time">00:00</span><label>Čas</label></div>
        <div class="stat-box"><span id="s-pts">0</span><label>Body</label></div>
    </div>
    <button id="startB" class="btn btn-p" style="height: 75px;" onclick="start()">START VÝZVY</button>
    <button id="stopB" class="btn" style="height: 75px; background: #ef4444; color: white; display: none;" onclick="stop()">STOP A ULOŽIT</button>
</div>

<div id="hist" class="screen">
    <div class="stats-summary">
        <div class="summary-item"><b id="sum-km">0.0</b><label>KM Celkem</label></div>
        <div class="summary-item"><b id="sum-pts">0</b><label>Body</label></div>
    </div>
    <div id="hist-list"></div>
</div>

<div id="sett" class="screen">
    <h2 style="margin-left: 10px;">Nastavení</h2>
    <div class="auth-card" style="box-shadow:none; width:auto;">
        <label style="color:#64748b; font-size:0.8rem; display:block; text-align:left; margin-left:10px;">E-mail</label>
        <input type="email" id="new-email">
        <button class="btn btn-p" onclick="updateEmail()">Uložit změny</button>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDNrZQJDgTITduIm62uTU1QTaDLBMZ9hws",
        authDomain: "donutgamba.firebaseapp.com",
        projectId: "donutgamba",
        storageBucket: "donutgamba.firebasestorage.app",
        messagingSenderId: "785116130586",
        appId: "1:785116130586:web:e7a4c72b9fed8a9efdd0a3"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth(), db = firebase.firestore();

    let map, path, userMarker, watch, last, dist = 0, coords = [], user, isReg = false, startTime, timerInt;

    function toggleAuthMode() { isReg = !isReg; document.getElementById('a-btn').innerText = isReg ? "REGISTROVAT" : "VSTOUPIT"; }
    async function handleAuth() {
        const e = document.getElementById('a-email').value, p = document.getElementById('a-pass').value;
        try { isReg ? await auth.createUserWithEmailAndPassword(e, p) : await auth.signInWithEmailAndPassword(e, p); }
        catch (err) { alert(err.message); }
    }
    auth.onAuthStateChanged(u => {
        if (u) { user = u; document.getElementById('auth-screen').style.display = 'none'; document.getElementById('main-nav').style.display = 'flex'; document.getElementById('menu-email').innerText = u.email; initMap(); }
    });
    function logout() { auth.signOut(); location.reload(); }

    function toggleMenu() {
        document.getElementById('side-menu').classList.toggle('active');
        const o = document.getElementById('overlay');
        o.style.display = o.style.display === 'block' ? 'none' : 'block';
    }

    function go(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.menu-item').forEach(m => m.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.getElementById('m-' + id).classList.add('active');
        toggleMenu();
        if (id === 'hist') loadHist();
    }

    function initMap() {
        if (map) return;
        map = L.map('map', {zoomControl:false}).setView([50, 14], 15);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}.png').addTo(map);
        path = L.polyline([], {color: '#10b981', weight: 6}).addTo(map);
        userMarker = L.circleMarker([50, 14], { radius: 9, fillColor: "#ff5722", color: "#fff", weight: 3, fillOpacity: 1 }).addTo(map);
        
        // Okamžitý Focus GPS
        navigator.geolocation.getCurrentPosition(p => {
            const pos = [p.coords.latitude, p.coords.longitude];
            map.setView(pos, 18); userMarker.setLatLng(pos);
        }, null, {enableHighAccuracy: true});
    }

    function start() {
        dist = 0; coords = []; last = null; startTime = Date.now();
        document.getElementById('startB').style.display = 'none';
        document.getElementById('stopB').style.display = 'block';
        document.getElementById('debug').innerText = "GPS aktivní - pohyb zaznamenáván...";

        timerInt = setInterval(() => {
            const sec = Math.floor((Date.now() - startTime) / 1000);
            document.getElementById('s-time').innerText = new Date(sec * 1000).toISOString().substr(14, 5);
        }, 1000);

        // CENTIMETROVÁ PŘESNOST (Tolerance 1m pro schody)
        watch = navigator.geolocation.watchPosition(p => {
            const cur = L.latLng(p.coords.latitude, p.coords.longitude);
            userMarker.setLatLng(cur);
            if (last) {
                let d = last.distanceTo(cur);
                // Nastaveno na 1 metr pro maximální citlivost
                if (d > 1.0) {
                    dist += d; coords.push([p.coords.latitude, p.coords.longitude]);
                    path.setLatLngs(coords); map.panTo(cur);
                    document.getElementById('debug').innerText = `Pohyb: +${d.toFixed(1)}m | Celkem: ${dist.toFixed(1)}m`;
                }
            }
            last = cur;
            document.getElementById('s-dist').innerText = (dist/1000).toFixed(2);
            document.getElementById('s-pts').innerText = Math.floor((dist/1000) * 10);
        }, null, {
            enableHighAccuracy: true,
            maximumAge: 0,
            timeout: 5000
        });
    }

    async function stop() {
        clearInterval(timerInt); navigator.geolocation.clearWatch(watch);
        const finalKm = parseFloat((dist/1000).toFixed(2));
        if (finalKm >= 0.01) {
            await db.collection("aktivity").add({
                uid: user.uid, vzdalenost: finalKm, body: Math.floor(finalKm * 10),
                cas: document.getElementById('s-time').innerText, trasa: JSON.stringify(coords),
                datum: firebase.firestore.FieldValue.serverTimestamp()
            });
            alert("Výkon 2026 uložen!");
        }
        location.reload();
    }

    async function loadHist() {
        const list = document.getElementById('hist-list');
        list.innerHTML = "<p style='text-align:center'>Načítám data 2026...</p>";
        const snap = await db.collection("aktivity").where("uid", "==", user.uid).orderBy("datum", "desc").get();
        let totalKm = 0, totalPts = 0;
        list.innerHTML = "";
        snap.forEach(doc => {
            const d = doc.data();
            totalKm += d.vzdalenost; totalPts += d.body;
            const date = d.datum ? d.datum.toDate() : new Date();
            list.innerHTML += `<div class="history-card">
                <div style="display:flex; justify-content:space-between; font-weight:900;">
                    <span>${d.vzdalenost} km</span><span style="color:var(--p);">+${d.body} b</span>
                </div>
                <div style="color:#64748b; font-size:0.8rem; margin-top:5px;">${date.toLocaleDateString()} | ${d.cas}</div>
                <div id="m-${doc.id}" class="mini-map"></div>
            </div>`;
            setTimeout(() => {
                const m = L.map(`m-${doc.id}`, {zoomControl:false, attributionControl:false}).setView([50,14], 15);
                L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}.png').addTo(m);
                const tr = JSON.parse(d.trasa || "[]");
                if (tr.length > 0) { const p = L.polyline(tr, {color: '#10b981', weight: 4}).addTo(m); m.fitBounds(p.getBounds()); }
            }, 400);
        });
        document.getElementById('sum-km').innerText = totalKm.toFixed(1);
        document.getElementById('sum-pts').innerText = totalPts;
    }

    async function updateEmail() { try { await user.updateEmail(document.getElementById('new-email').value); alert("Změněno!"); } catch(e) { alert("Chyba: " + e.message); } }
</script>
</body>
</html>
